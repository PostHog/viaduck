name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      UV_FROZEN: "true"
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      with:
        version: "0.7.*"
        python-version: "3.12"

    - name: Lock check
      run: uv lock --check
      env:
        UV_FROZEN: ""

    - name: Format check
      run: uv run ruff format --check --exclude viaduck/_version.py viaduck/ tests/

    - name: Lint
      run: uv run ruff check viaduck/ tests/

    - name: Unit tests
      run: uv run pytest tests/unit

    - name: Integration tests
      run: uv run pytest tests/integration

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
      with:
        fail-on-severity: moderate
        allow-licenses: Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, PSF-2.0

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Build Docker image
      run: docker build --build-arg VIADUCK_VERSION=0.0.0.dev0 -t viaduck .
