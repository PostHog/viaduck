name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    # Clone pyducklake alongside for [tool.uv.sources] local path override.
    # Remove this step once pyducklake 1.0.4+ is published on PyPI.
    - name: Clone pyducklake
      run: git clone --depth 1 https://x-access-token:${{ github.token }}@github.com/posthog/pyducklake.git ../pyducklake

    - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

    - name: Format check
      run: uv run ruff format --check viaduck/ tests/

    - name: Lint
      run: uv run ruff check viaduck/ tests/

    - name: Unit tests
      run: uv run pytest -m "not integration and not e2e and not perf"

    - name: Integration tests
      run: uv run pytest tests/integration

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
      with:
        fail-on-severity: moderate
        allow-licenses: Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause, PSF-2.0

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Build Docker image
      run: docker build --build-arg VIADUCK_VERSION=0.0.0.dev0 -t viaduck .
